name: Sprawdź zajętość

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Instalacja Playwright
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Sprawdź zajętość
        id: check
        run: python check_availability.py

      - name: Zaktualizuj CSV
        run: |
          git config user.name  "Monitor Bot"
          git config user.email "bot@github-actions"
          git add data/
          git diff --staged --quiet || git commit -m "📊 ${{ steps.check.outputs.date }}: ${{ steps.check.outputs.status }}"
          git push

      - name: Podsumowanie
        if: always()
        run: |
          echo "## ${{ steps.check.outputs.date }}" >> $GITHUB_STEP_SUMMARY
          echo "Status: **${{ steps.check.outputs.status }}**" >> $GITHUB_STEP_SUMMARY

      - name: Artefakt debug
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: debug-${{ github.run_id }}
          path: |
            data/last_page.html
            data/debug_ht.json
            data/debug_classes.txt
            data/run_log.txt
          retention-days: 7
